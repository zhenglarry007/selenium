# target execution: local, selenium-grid or testcontainers
target = local

# browser to use for local and testcontainers execution
browser = chrome

# initial URL
url.base = http://localhost:5173/

# global test timeout
timeout = 3

# datafaker locale
faker.locale = en-US

# headless mode only for chrome or firefox and local execution
headless = false

# environment: local or ci
environment = local

# retry count for local execution
retry.local = 0

# retry count for CI execution
retry.ci = 2
